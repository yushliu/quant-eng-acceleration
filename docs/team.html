<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quant Engineering Community | Team</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="team" class="min-h-screen bg-gray-100 text-gray-900 antialiased">
  <header id="site-header"></header>

  <main class="mx-auto max-w-[1100px] px-4 pb-14 pt-28 sm:px-6">
    <section>
      <h1 id="team-title" class="text-2xl font-semibold tracking-tight text-gray-900 sm:text-3xl">Team</h1>
      <p id="team-description" class="mt-3 max-w-2xl text-sm leading-6 text-gray-600 sm:text-base">
        Meet the people behind the club's algorithm work, engineering support, and shared team structure for reproducible benchmarking.
      </p>
    </section>
    <p id="team-error" class="mt-6 hidden rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"></p>
    <div id="team-sections"></div>
  </main>

  <footer class="mx-auto max-w-[1100px] px-4 pb-10 sm:px-6">
    <p class="border-t border-gray-200 pt-5 text-xs leading-5 text-gray-500">
      Independent student community. Not affiliated with or endorsed by Purdue. No live trading. No exchange connectivity.
    </p>
  </footer>

  <script src="./js/site-config.js" defer></script>
  <script src="./js/layout.js" defer></script>
  <script src="./js/main.js" defer></script>
  <script src="./js/team-data.js" defer></script>
  <script src="./js/team.js" defer></script>
</body>
</html>
